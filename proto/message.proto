syntax = "proto3";

package belphegor;

option go_package = "internal/types/proto";

message Message {
  int64 ID = 1;
  uint64 ContentLength = 2;
  Mime MimeType = 3;
  uint64 ContentHash = 4;
  // file name if mime == path
  string Name = 5;
  // data as raw stream after write metadata
  int64 BatchID = 6;
  uint32 BatchTotal = 7;
}

message Announce {
  int64 ID = 1;
  uint64 ContentLength = 2;
  Mime MimeType = 3;
  uint64 ContentHash = 4;
  int64 BatchID = 5;
  uint32 BatchTotal = 6;
}

message RequestMessage {
  int64 ID = 1;
}

enum Mime {
  TEXT = 0;
  IMAGE = 1;
  PATH = 2;
}